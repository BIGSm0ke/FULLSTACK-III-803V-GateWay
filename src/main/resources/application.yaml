server:
  port: 8085

spring:
  application:
    name: gateway-jwr
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: usuarios-service
              uri: http://localhost:8081
              predicates:
                - Path=/usuarios,/usuarios/**
            - id: productos-service
              uri: http://localhost:8082
              predicates:
                - Path=/productos,/productos/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway